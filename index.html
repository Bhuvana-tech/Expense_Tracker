<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Budget Tracker</title>
    <link rel="stylesheet" href="style1.css">
</head>
<body>

<div class="container">
    <h1>Budget Tracker</h1>

    <div class="card">
        <input type="number" id="budget" placeholder="Enter Budget">
        <button onclick="setBudget()">Set Budget</button>

        <h2>Budget: ₹<span id="budgetDisplay">0</span></h2>
    </div>

    <div class="card">
        <input type="text" id="name" placeholder="Expense name">
        <input type="number" id="amount" placeholder="Amount">
        <button onclick="addExpense()">Add Expense</button>
    </div>

    <ul id="list"></ul>

    <div class="summary">
        <h3>Total Spent: ₹<span id="total">0</span></h3>
        <h3>Remaining: ₹<span id="remaining">0</span></h3>
    </div>
</div>

<script src="script1.js"></script>

</body>
</html>
